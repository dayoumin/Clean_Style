<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 | 청렴스타일</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard Variable", Pretendard, sans-serif;
      background: #f0f1f5;
      color: #1a1a2e;
      padding: 24px;
    }
    .card {
      max-width: 360px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #5a6080; line-height: 1.6; margin-bottom: 24px; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #4361ee;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { background: #2a2a4e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>인터넷 연결이 필요해요</h1>
    <p>네트워크에 연결한 뒤 다시 시도해주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
